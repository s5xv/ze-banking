# Must match the Worker name the CI build expects, or Workers Builds overrides
# it and deploys under a different name than local `wrangler deploy` does.
name = "ze-banking"
main = "src/index.js"
compatibility_date = "2026-06-01"

# V1's account, where the repo's Workers Build runs. Pinned so the CLI and CI
# never disagree about which account they're deploying to.
account_id = "44e5e10adf532b039a51d6f05472aa58"

[[d1_databases]]
binding = "DB"
database_name = "ze-bank"
# Fill from `npx wrangler d1 create ze-bank`. Must be a database on the account
# above - an id from another account fails with "could not be found [7404]".
database_id = "9af86057-3531-4305-beee-7ceae2fef003"

# Deposit ingestion + reconciliation every 5 minutes; interest is checked
# hourly and only acts on the 1st (the UNIQUE(account_id, period) constraint
# makes running it more often harmless).
[triggers]
crons = ["*/5 * * * *", "0 * * * *"]

[vars]
BANK_NAME = "Z&E Bank"
ADMIN_DISCORD_IDS = "1502172252811034735"
# ---------------------------------------------------------------------------
# SECRETS - never in this file.
#
#   npx wrangler secret put DC_API_TOKEN        # BUSINESS JWT, /treasuryapi business issue
#   npx wrangler secret put POOL_ACCOUNT_ID     # firm account holding customer funds
#   npx wrangler secret put TOKEN_SECRET        # signs session cookies
#   npx wrangler secret put DISCORD_CLIENT_ID
#   npx wrangler secret put DISCORD_CLIENT_SECRET
#   npx wrangler secret put WEBHOOK_SECRET      # returned by registerWebhook()
#
# DC_API_TOKEN can move every coin the bank holds. Treat it accordingly:
# secret only, rotate via /api/v1/auth/rotate on any suspicion, and never let
# it reach a client bundle or a log line.
# ---------------------------------------------------------------------------
